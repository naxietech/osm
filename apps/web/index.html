<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSES — On-Screen Exam System</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Apply the saved theme before first paint to avoid a flash of the wrong colors. -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('oses-theme');
          if (theme !== 'light' && theme !== 'dark') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
          /* storage blocked — light theme (and index.css defaults) apply */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p>JavaScript is required to run OSES. Please enable JavaScript in your browser.</p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
